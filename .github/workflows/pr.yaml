name: pr
on:
  push:
    branches:
      - "pull-request/[0-9]+"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  pr-builder:
    needs:
      - telemetry-setup
      - checks
      - docs-build
    uses: rapidsai/shared-workflows/.github/workflows/pr-builder.yaml@cuda-13.3.0
    if: always()
    with:
      needs: ${{ toJSON(needs) }}
    permissions:
      contents: read
  telemetry-setup:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      OTEL_SERVICE_NAME: "pr-cugraph-docs"
    steps:
      - name: Telemetry setup
        uses: rapidsai/shared-actions/telemetry-dispatch-stash-base-env-vars@main
  checks:
    needs: telemetry-setup
    uses: rapidsai/shared-workflows/.github/workflows/checks.yaml@cuda-13.3.0
    with:
      enable_check_generated_files: false
      ignored_pr_jobs: "telemetry-summarize"
    permissions:
      contents: read
  docs-build:
    needs: checks
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/custom-job.yaml@cuda-13.3.0
    with:
      build_type: pull-request
      node_type: "gpu-l4-latest-1"
      arch: "amd64"
      container_image: "rapidsai/ci-conda:26.08-latest"
      script: "ci/build_docs.sh"
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  telemetry-summarize:
    # This job must use a self-hosted runner to record telemetry traces.
    runs-on: linux-amd64-cpu4
    needs: pr-builder
    if: ${{ vars.TELEMETRY_ENABLED == 'true' && !cancelled() }}
    continue-on-error: true
    steps:
      - name: Telemetry summarize
        uses: rapidsai/shared-actions/telemetry-dispatch-summarize@main
    permissions:
      actions: write
